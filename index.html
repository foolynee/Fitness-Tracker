document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-bd50-4171-9219-42e73282e14e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Sora';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"37aea385-1d91-4be1-8b45-2e4d9fe40cb4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle><style>\n:root{--bg:oklch(0.97 0.006 85);--surface:oklch(0.995 0.003 85);--ink:oklch(0.22 0.02 90);--ink-soft:oklch(0.52 0.02 90);--line:oklch(0.91 0.008 90);--track:oklch(0.93 0.008 90);--orange:oklch(0.68 0.17 45);--blue:oklch(0.63 0.14 235);--green:oklch(0.62 0.15 150)}\n*{box-sizing:border-box}\nbody{margin:0;background:var(--bg)}\n.app{max-width:560px;margin:0 auto;min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif}\n.topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:24px 20px 6px}\n.date{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;font-weight:700}\n.hello{font-family:'Sora',sans-serif;font-weight:800;font-size:26px;margin:3px 0 0;letter-spacing:-.01em}\n.weight-chip{background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:9px 14px;font-weight:700;font-size:13px;box-shadow:0 1px 2px rgba(20,20,10,.04);white-space:nowrap}\n.tabs{display:flex;gap:6px;padding:14px 20px;position:sticky;top:0;background:var(--bg);z-index:5}\n.tab{flex:1;padding:10px 0;border:none;background:transparent;border-radius:12px;font-family:'Sora',sans-serif;font-weight:700;font-size:12.5px;color:var(--ink-soft);cursor:pointer}\n.tab.active{background:var(--ink);color:#fff}\n.section{padding:6px 20px 40px;display:flex;flex-direction:column;gap:18px}\n.rings{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}\n.ring-card{background:var(--surface);border-radius:20px;padding:14px 8px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 1px 3px rgba(20,20,10,.05)}\n.ring{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:box-shadow .2s}\n.ring.hit{box-shadow:0 0 0 4px oklch(0.9 0.05 150 / .4)}\n.ring-inner{width:68px;height:68px;border-radius:50%;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center}\n.ring-val{font-family:'Sora',sans-serif;font-weight:800;font-size:16px;line-height:1}\n.ring-goal{font-size:9.5px;color:var(--ink-soft);margin-top:2px}\n.ring-label{font-size:10.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em}\n.chips{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}\n.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 9px;font-size:11.5px;font-weight:600;color:var(--ink);cursor:pointer}\n.chip:active{transform:scale(.95)}\n.chip.reset{color:var(--ink-soft);border-style:dashed}\n.card{background:var(--surface);border-radius:20px;padding:18px;box-shadow:0 1px 3px rgba(20,20,10,.05)}\n.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px}\n.card-title{font-family:'Sora',sans-serif;font-weight:800;font-size:16px}\n.card-sub{font-size:12px;color:var(--ink-soft);margin-top:2px}\n.swap-btn{font-size:11px;font-weight:700;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 11px;cursor:pointer;color:var(--ink-soft);white-space:nowrap}\n.swap-btn.on{background:var(--orange);color:#fff;border-color:var(--orange)}\n.progress-track{height:6px;border-radius:99px;background:var(--track);overflow:hidden;margin-bottom:14px}\n.progress-fill{height:100%;background:var(--green);border-radius:99px}\n.day-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line)}\n.day-row:first-child{border-top:none}\n.checkbox{width:24px;height:24px;border-radius:8px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#fff;color:#fff;font-size:14px;font-weight:800}\n.checkbox.checked{background:var(--green);border-color:var(--green)}\n.day-info{flex:1;cursor:pointer}\n.day-name-row{display:flex;align-items:baseline;gap:8px}\n.day-abbr{font-size:10.5px;font-weight:800;color:var(--ink-soft);text-transform:uppercase;width:30px;flex-shrink:0}\n.day-title{font-weight:700;font-size:14px}\n.day-title.done{text-decoration:line-through;color:var(--ink-soft)}\n.day-sub{font-size:11.5px;color:var(--ink-soft);margin-top:2px}\n.chevron{color:var(--ink-soft);transition:transform .15s;flex-shrink:0}\n.chevron.open{transform:rotate(180deg)}\n.day-detail{padding:4px 0 6px 42px;display:flex;flex-direction:column;gap:10px}\n.detail-block h4{font-family:'Sora',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin:0 0 5px}\n.detail-block ul{margin:0;padding-left:18px;font-size:13px;line-height:1.65;color:var(--ink)}\n.detail-note{font-size:12.5px;color:var(--ink-soft);font-style:italic}\n.schedule-list{display:flex;flex-direction:column;gap:10px}\n.badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.03em}\n.badge.strength{background:oklch(0.9 0.03 235);color:var(--blue)}\n.badge.mobility{background:oklch(0.9 0.03 150);color:var(--green)}\n.badge.cardio{background:oklch(0.9 0.04 45);color:var(--orange)}\n.badge.rest{background:var(--track);color:var(--ink-soft)}\n.macro-summary{background:var(--ink);color:#fff;border-radius:20px;padding:20px}\n.macro-summary .kcal{font-family:'Sora',sans-serif;font-weight:800;font-size:30px}\n.macro-summary .kcal span{font-size:14px;font-weight:600;opacity:.6;margin-left:4px}\n.macro-row{display:flex;gap:16px;margin-top:16px}\n.macro-item{flex:1}\n.macro-item .mv{font-weight:700;font-size:13px}\n.macro-item .ml{font-size:10.5px;opacity:.65;text-transform:uppercase;letter-spacing:.04em}\n.macro-bar-track{height:5px;background:rgba(255,255,255,.18);border-radius:99px;margin-top:7px}\n.macro-bar-fill{height:100%;border-radius:99px}\n.meal-list{display:flex;flex-direction:column;gap:10px}\n.meal-detail{padding:10px 0 2px}\n.ingredient-row{display:grid;grid-template-columns:1fr auto auto auto auto;gap:10px;font-size:12px;padding:7px 0;border-top:1px solid var(--line);align-items:center}\n.ingredient-row:first-child{border-top:none}\n.ing-head{color:var(--ink-soft);font-weight:700;text-transform:uppercase;font-size:9.5px}\n.ing-num{text-align:right;min-width:32px}\n.weeks-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}\n.week-card{background:var(--surface);border-radius:16px;padding:14px 8px;text-align:center;box-shadow:0 1px 3px rgba(20,20,10,.05)}\n.week-card.current{border:2px solid var(--orange)}\n.week-label{font-size:10.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase}\n.week-weight{font-family:'Sora',sans-serif;font-weight:800;font-size:19px;margin-top:6px}\n.week-bf{font-size:12.5px;color:var(--ink-soft);margin-top:2px}\n.week-waist{font-size:11px;color:var(--ink-soft);margin-top:2px}\n.weeks-table{width:100%;border-collapse:collapse}\n.weeks-table thead th{font-size:10px;font-weight:800;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;text-align:left;padding:12px 14px;border-bottom:1px solid var(--line)}\n.weeks-table thead th:not(:first-child){text-align:right}\n.weeks-table td{padding:12px 14px;border-top:1px solid var(--line);font-size:13px;font-weight:600}\n.weeks-table td.wk-num{text-align:right;font-variant-numeric:tabular-nums}\n.wk-label{font-family:'Sora',sans-serif;font-weight:800;font-size:13.5px}\n.wk-range{font-size:10.5px;color:var(--ink-soft);font-weight:500;margin-top:2px}\n.current-row{background:oklch(0.96 0.03 45 / .5)}\n.weeks-table .week-delta{text-align:right;font-weight:700;font-size:12px}\n.wk-actions{text-align:right;white-space:nowrap}\n.wk-icon-btn{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--ink-soft);font-size:12px;cursor:pointer;margin-left:5px}\n.wk-icon-btn.del{color:var(--orange);border-color:oklch(0.85 0.05 45)}\n.week-delta{font-size:10.5px;font-weight:700;margin-top:8px}\n.week-delta.down{color:var(--green)}\n.week-delta.up{color:var(--orange)}\n.week-delta.flat{color:var(--ink-soft)}\n.chart-legend{display:flex;gap:16px;margin-bottom:10px}\n.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink-soft)}\n.legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block}\n.chart-wrap{position:relative}\n.trend-svg{width:100%;height:140px;display:block}\n.chart-label{position:absolute;transform:translate(-50%,-50%);font-size:11px;font-weight:800;font-family:'Sora',sans-serif;white-space:nowrap;background:var(--surface);padding:1px 4px;border-radius:5px}\n.grid-line{stroke:var(--line);stroke-width:1}\n.trend-line{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}\n.weight-line{stroke:var(--orange)}\n.bf-line{stroke:var(--blue)}\n.trend-dot{stroke:var(--surface);stroke-width:2}\n.weight-dot{fill:var(--orange)}\n.bf-dot{fill:var(--blue)}\n.weight-label{color:var(--orange)}\n.bf-label{color:var(--blue)}\n.chart-xlabels{display:flex;justify-content:space-between;margin-top:8px;padding:0 2px}\n.chart-xlabels span{font-size:10px;font-weight:700;color:var(--ink-soft);text-transform:uppercase}\n.week-range{font-size:9.5px;color:var(--ink-soft);margin-top:2px}\n.add-week-btn{width:100%;border:1.5px dashed var(--line);background:transparent;border-radius:16px;padding:14px;font-weight:700;font-size:13px;color:var(--ink-soft);cursor:pointer}\n.add-week-row{disp ody fat (%)<\u002Flabel><input type=\"number\" step=\"0.1\" value=\"{{ newBf }}\" onchange=\"{{ onNewBfChange }}\" placeholder=\"27.5\"><\u002Fdiv><\u002Fdiv><div class=\"add-week-row\" style=\"margin-top:10px\"><div class=\"add-week-field\"><label>Waist (cm)<\u002Flabel><input type=\"number\" step=\"0.1\" value=\"{{ newWaist }}\" onchange=\"{{ onNewWaistChange }}\" placeholder=\"68\"><\u002Fdiv><\u002Fdiv><div class=\"add-week-actions\"><button class=\"swap-btn\" onclick=\"{{ toggleAddWeek }}\">Cancel<\u002Fbutton><button class=\"swap-btn on\" onclick=\"{{ submitNewWeek }}\" disabled=\"{{ !canAddWeek }}\">Save<\u002Fbutton><\u002Fdiv><\u002Fdiv><\u002Fsc-if><sc-if value=\"{{ !showAddWeek }}\"><button class=\"add-week-btn\" onclick=\"{{ toggleAddWeek }}\">+ Log new week<\u002Fbutton><\u002Fsc-if><div class=\"card\"><div class=\"card-sub\">Started at 55.5kg / 28.2% body fat. Holding steady around 55.3kg while body fat trends down slightly — consistent with recomposition (losing fat, maintaining/building muscle).<\u002Fdiv><\u002Fdiv><\u002Fsection><\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844},&quot;calorieGoal&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:1450,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:800,&quot;max&quot;:4000,&quot;step&quot;:10,&quot;section&quot;:&quot;Goals&quot;},&quot;waterGoal&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:2000,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:500,&quot;max&quot;:5000,&quot;step&quot;:50,&quot;section&quot;:&quot;Goals&quot;},&quot;stepGoal&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:10000,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:1000,&quot;max&quot;:30000,&quot;step&quot;:500,&quot;section&quot;:&quot;Goals&quot;}}\">\nclass Component extends DCLogic {\n  static SCHEDULE = [\n    {id:'mon',abbr:'Mon',title:'Lower Body',type:'strength',sub:'Warm-up 5m · Strength 55m · Stretch 5m',hasBlocks:true,mainLabel:'Strength',warmup:['2 min light jogging','Bodyweight squats: 10 reps','Glute bridges: 15 reps'],main:['Barbell Back Squat: 4x8','Romanian Deadlift: 3x8','Leg Press: 3x10','Calf Raises: 3x12'],stretch:['Quad stretch','Hamstring stretch','Glute stretch','Hip flexor stretch']},\n    {id:'tue',abbr:'Tue',title:'Push',type:'strength',sub:'Warm-up 5m · Strength 55m · Stretch 5m',hasBlocks:true,mainLabel:'Strength',warmup:['2 min arm circles + light cardio','Push-ups: 8 reps','Band pull-aparts: 10 reps'],main:['Bench Press: 4x8','Incline Dumbbell Press: 3x8','Shoulder Press: 3x8','Tricep Dips: 3x8'],stretch:['Chest stretch','Shoulder stretch','Tricep stretch']},\n    {id:'wed',abbr:'Wed',title:'Pull',type:'strength',sub:'Warm-up 5m · Strength 55m · Stretch 5m',hasBlocks:true,mainLabel:'Strength',warmup:['2 min light cardio','Band pull-aparts: 10 reps','Scapular rows: 10 reps'],main:['Barbell Rows: 4x8','Pull-ups/Assisted: 3x8','Lat Pulldown: 3x10','Barbell Curl: 3x8'],stretch:['Back stretch','Bicep stretch','Lat stretch']},\n    {id:'thu',abbr:'Thu',title:'Lower + Core',type:'strength',sub:'Warm-up 5m · Strength 55m · Stretch 5m',hasBlocks:true,mainLabel:'Strength',warmup:['2 min light jogging','Bodyweight squats: 10 reps','Dead bugs: 10 reps'],main:['Deadlift: 4x5','Front Squats: 3x8','Plank: 3x45 sec','Ab Wheel Rollout: 3x10'],stretch:['Full body lower + core focus']},\n    {id:'fri',abbr:'Fri',title:'Light Mobility',type:'mobility',sub:'10-15 min',hasBlocks:true,mainLabel:'Mobility',warmup:['Full body stretching routine'],main:['Foam rolling (optional)','Yoga flow (optional)'],stretch:['Hold each stretch 20-30 sec']},\n    {id:'sat',abbr:'Sat',title:'Cardio',type:'cardio',sub:'Warm-up 5m · Run 40m · Stretch 5m',hasBlocks:true,mainLabel:'Cardio',warmup:['5 min easy jog/walk'],main:['30-45 min steady state running','Heart rate: 120-140 bpm'],stretch:['Legs, hips, calves'],restNote:'Can swap with Sunday rest if tired.'},\n    {id:'sun',abbr:'Sun',title:'Rest Day',type:'rest',sub:'Complete rest',hasBlocks:false,isRest:true,restNote:'Complete rest — recovery only.'}\n  ];\n  static MEAL_DEFS = {\n    breakfast: {id:'breakfast',name:'Breakfast',kcal:350,carbs:48,protein:22,fat:2,items:[\n      {name:'Corn (cooked) 100g',kcal:86,carbs:19,protein:3,fat:0},\n      {name:'Greek yogurt (plain) 100g',kcal:60,carbs:3,protein:10,fat:0},\n      {name:'Mixed berries 100g',kcal:50,carbs:12,protein:1,fat:0},\n      {name:'Egg, large',kcal:80,carbs:0,protein:6,fat:5},\n      {name:'Granola 20g',kcal:80,carbs:14,protein:2,fat:2}\n    ]},\n    lunch: {id:'lunch',name:'Lunch',kcal:450,carbs:98,protein:41,fat:1.5,items:[\n      {name:'White rice (cooked) 300g',kcal:390,carbs:86,protein:9,fat:0},\n      {name:'Grilled chicken breast 120g',kcal:132,carbs:0,protein:29,fat:3},\n      {name:'Stir-fried vegetables 200g',kcal:60,carbs:12,protein:3,fat:0},\n      {name:'Cooking oil 5g',kcal:0,carbs:0,protein:0,fat:0}\n    ]},\n    dinner: {id:'dinner',name:'Dinner',kcal:400,carbs:79,protein:36,fat:1.5,items:[\n      {name:'Brown rice (cooked) 250g',kcal:325,carbs:72,protein:8,fat:0},\n      {name:'Lean pork/beef, grilled 100g',kcal:110,carbs:0,protein:25,fat:3},\n      {name:'Steamed greens 200g',kcal:40,carbs:7,protein:3,fat:0},\n      {name:'Cooking oil 5g',kcal:0,carbs:0,protein:0,fat:0}\n    ]},\n    preworkout: {id:'preworkout',name:'Pre-Workout Snack',kcal:135,carbs:35,protein:1.5,fat:0,note:'Take 30 min before workout',items:[\n      {name:'Banana, 1.5 medium (150g)',kcal:135,carbs:35,protein:1.5,fat:0}\n    ]},\n    precardio: {id:'precardio',name:'Pre-Workout Snack',kcal:135,carbs:35,protein:1.5,fat:0,time:'5:30 AM',items:[\n      {name:'Banana, 1.5 medium (150g)',kcal:135,carbs:35,protein:1.5,fat:0}\n    ]}\n  };\n  static DAY_MEAL_PLANS = {\n    strength:{label:'Strength Training Day',ids:['breakfast','lunch','preworkout','dinner'],total:{kcal:1450,carbs:230,protein:102,fat:11}},\n    mobility:{label:'Light Mobility Day',ids:['breakfast','lunch','dinner'],total:{kcal:1200,carbs:195,protein:99,fat:9}},\n    cardio:{label:'Cardio Day',ids:['precardio','breakfast','lunch','dinner'],total:{kcal:1450,carbs:230,protein:102,fat:11},times:{precardio:'5:30 AM',breakfast:'7:00 AM',lunch:'12:30 PM',dinner:'7:30 PM'}},\n    rest:{label:'Rest Day',ids:['breakfast','lunch','dinner'],total:{kcal:1200,carbs:195,protein:99,fat:9}}\n  };\n  static DAY_TYPE = {mon:'strength',tue:'strength',wed:'strength',thu:'strength',fri:'mobility',sat:'cardio',sun:'rest'};\n  static PROGRAM_START = new Date(2026,5,22);\n  static BASE_WEEKS = [\n    {weight:55.5,bf:28.2,waist:null},\n    {weight:55.0,bf:27.9,waist:null},\n    {weight:55.3,bf:27.9,waist:null}\n  ];\n  static fmtRange(startDate){\n    const end = new Date(startDate); end.setDate(end.getDate()+6);\n    const opts = {month:'short',day:'numeric'};\n    return startDate.toLocaleDateString(undefined,opts) + ' – ' + end.toLocaleDateString(undefined,opts);\n  }\n\n  state = {tab:'today',calories:0,water:0,steps:0,workoutChecks:{mon:false,tue:false,wed:false,thu:false,fri:false,sat:false,sun:false},mealChecks:{breakfast:false,lunch:false,preworkout:false,precardio:false,dinner:false},satSwap:false,expandDay:null,expandMeal:null,customWeeks:Component.BASE_WEEKS.map(w=>({...w})),newWeight:'',newBf:'',newWaist:'',showAddWeek:false,editingWeekIdx:null};\n\n  componentDidMount(){\n    try{\n      const raw = localStorage.getItem('fitnessTrackerV1');\n      if(raw){\n        const saved = JSON.parse(raw);\n        const customWeeks = (saved.customWeeks && saved.customWeeks.length) ? saved.customWeeks : Component.BASE_WEEKS.map(w=>({...w}));\n        this.setState(s=>({...s,...saved,customWeeks}));\n      }\n    }catch(e){}\n  }\n\n  persist(nextState){\n    try{\n      localStorage.setItem('fitnessTrackerV1', JSON.stringify({calories:nextState.calories,water:nextState.water,steps:nextState.steps,workoutChecks:nextState.workoutChecks,mealChecks:nextState.mealChecks,satSwap:nextState.satSwap,customWeeks:nextState.customWeeks}));\n    }catch(e){}\n  }\n\n  update(patch){\n    this.setState(s=>{\n      const next = typeof patch==='function' ? {...s,...patch(s)} : {...s,...patch};\n      this.persist(next);\n      return next;\n    });\n  }\n\n  buildChart(weeks){\n    const n = weeks.length;\n    const padX = 14, w = 300, h = 140, padY = 14;\n    const xFor = i => n<=1 ? w/2 : padX + (i*(w-2*padX)/(n-1));\n    const weightsArr = weeks.map(w=>w.weight);\n    const bfArr = weeks.map(w=>w.bf);\n    const wMin = Math.min(...weightsArr), wMax = Math.max(...weightsArr);\n    const bMin = Math.min(...bfArr), bMax = Math.max(...bfArr);\n    const wRange = (wMax-wMin)||1, bRange = (bMax-bMin)||1;\n    const yForWeight = v => h-padY - ((v-wMin)/wRange)*(h-2*padY);\n    const yForBf = v => h-padY - ((v-bMin)/bRange)*(h-2*padY);\n    const weightPoints = weeks.map((wk,i)=>{\n      const x = xFor(i), y = yForWeight(wk.weight), bfY = yForBf(wk.bf);\n      const above = y <= bfY;\n      const topPct = above ? (y/h*100)-9 : (y/h*100)+9;\n      return {x, y, label: wk.weight+'kg', leftPct: x/w*100, topPct};\n    });\n    const bfPoints = weeks.map((wk,i)=>{\n      const x = xFor(i), y = yForBf(wk.bf), wY = yForWeight(wk.weight);\n      const above = y < wY;\n      const topPct = above ? (y/h*100)-9 : (y/h*100)+9;\n      return {x, y, label: wk.bf+'%', leftPct: x/w*100, topPct};\n    });\n    const smoothPath = pts => {\n      if(pts.length<2) return '';\n      if(pts.length===2) return `M${pts[0].x},${pts[0].y} L${pts[1].x},${pts[1].y}`;\n      let d = `M${pts[0].x},${pts[0].y}`;\n      for(let i=0;i<pts.length-1;i++){\n        const p0 = pts[i-1] || pts[i];\n        const p1 = pts[i];\n        const p2 = pts[i+1];\n        const p3 = pts[i+2] || p2;\n        const c1x = p1.x + (p2.x-p0.x)/6;\n        const c1y = p1.y + (p2.y-p0.y)/6;\n        const c2x = p2.x - (p3.x-p1.x)/6;\n        const c2y = p2.y - (p3.y-p1.y)/6;\n        d += ` C${c1x},${c1y} ${c2x},${c2y} ${p2.x},${p2.y}`;\n      }\n      return d;\n    };\n    const weightLinePoints = smoothPath(weightPoints);\n    const bfLinePoints = smoothPath(bfPoints);\n    const gridLines = [0,1,2,3].map(i=>({y: padY + i*(h-2*padY)/3}));\n    return {weightPoints, bfPoints, weightLinePoints, bfLinePoints, gridLines};\n  }\n\n  ringBg(pct,color){\n    const p = Math.max(0,Math.min(100,pct));\n    return `conic-gradient(${color} ${p}%, var(--track) ${p}% 100%)`;\n  }\n\n  renderVals(){\n    const s = this.state;\n    const calorieGoal = this.props.calorieGoal ?? 1450;\n    const waterGoal = this.props.waterGoal ?? 2000;\n    const stepGoal = this.props.stepGoal ?? 10000;\n\n    const calPct = calorieGoal ? (s.calories/calorieGoal*100) : 0;\n    const waterPct = waterGoal ? (s.water/waterGoal*100) : 0;\n    const stepsPct = stepGoal ? (s.steps/stepGoal*100) : 0;\n\n    const base = Component.SCHEDULE;\n    const satBase = base.find(d=>d.id==='sat');\n    const sunBase = base.find(d=>d.id==='sun');\n    const displayDays = base.map(d=>{\n      let content = d;\n      if(d.id==='sat') content = s.satSwap ? {...sunBase,id:'sat',abbr:'Sat'} : {...satBase};\n      if(d.id==='sun') content = s.satSwap ? {...satBase,id:'sun',abbr:'Sun'} : {...sunBase};\n      const checked = !!s.workoutChecks[d.id];\n      const expanded = s.expandDay===d.id;\n      return {\n        ...content,\n        checked,\n        expanded,\n        checkMark: checked ? '✓' : '',\n        checkboxClass: 'checkbox' + (checked?' checked':''),\n        titleClass: 'day-title' + (checked?' done':''),\n        chevronClass: 'chevron' + (expanded?' open':''),\n        badgeClass: 'badge ' + content.type,\n        toggleCheck: ()=>this.update(st=>({workoutChecks:{...st.workoutChecks,[d.id]:!st.workoutChecks[d.id]}})),\n        toggleExpand: ()=>this.update(st=>({expandDay: st.expandDay===d.id?null:d.id}))\n      };\n    });\n\n    const workoutsDoneCount = Object.values(s.workoutChecks).filter(Boolean).length;\n    const dayIds = ['sun','mon','tue','wed','thu','fri','sat'];\n    const todayId = dayIds[new Date().getDay()];\n    const todayFull = {sun:'Sunday',mon:'Monday',tue:'Tuesday',wed:'Wednesday',thu:'Thursday',fri:'Friday',sat:'Saturday'}[todayId];\n    const todayDay = {...displayDays.find(d=>d.id===todayId), day: todayFull};\n    let mealDayId = todayId;\n    if(s.satSwap){ if(todayId==='sat') mealDayId='sun'; else if(todayId==='sun') mealDayId='sat'; }\n    const mealDayType = Component.DAY_TYPE[mealDayId];\n    const mealPlan = Component.DAY_MEAL_PLANS[mealDayType];\n\n    const meals = mealPlan.ids.map(id=>{\n      const def = Component.MEAL_DEFS[id];\n      const checked = !!s.mealChecks[id];\n      const time = (mealPlan.times && mealPlan.times[id]) || def.time;\n      return {\n        ...def,\n        time,\n        checked,\n        expanded: s.expandMeal===id,\n        chevronClass: 'chevron' + (s.expandMeal===id?' open':''),\n        checkboxClass: 'checkbox' + (checked?' checked':''),\n        checkMark: checked ? '✓' : '',\n        nameClass: 'day-title' + (checked?' done':''),\n        macroLine: (time?time+' · ':'') + `${def.carbs}g carbs · ${def.protein}g protein · ${def.fat}g fat`,\n        toggleExpand: ()=>this.update(st=>({expandMeal: st.expandMeal===id?null:id})),\n        toggleCheck: ()=>this.update(st=>{\n          const nowChecked = !st.mealChecks[id];\n          const delta = nowChecked ? def.kcal : -def.kcal;\n          return {mealChecks:{...st.mealChecks,[id]:nowChecked}, calories: Math.max(0, st.calories+delta)};\n        })\n      };\n    });\n    const mealsDoneCount = mealPlan.ids.filter(id=>s.mealChecks[id]).length;\n    const mealPlanLabel = mealPlan.label;\n\n    const totalKcal = mealPlan.total.kcal, totalCarbs = mealPlan.total.carbs, totalProtein = mealPlan.total.protein, totalFat = mealPlan.total.fat;\n\n    const allWeeksData = s.customWeeks;\n    const weeks = allWeeksData.map((w,i)=>{\n      const startDate = new Date(Component.PROGRAM_START); startDate.setDate(startDate.getDate()+i*7);\n      let deltaText = '—', deltaClass = 'week-delta flat';\n      if(i>0){\n        const prev = allWeeksData[i-1];\n        const dw = +(w.weight-prev.weight).toFixed(1);\n        const cls = dw<0?'down':dw>0?'up':'flat';\n        deltaText = (dw>0?'+':'') + dw + 'kg';\n        deltaClass = 'week-delta ' + cls;\n      }\n      const current = i===allWeeksData.length-1;\n      const hasWaist = w.waist!==null && w.waist!==undefined && w.waist!=='';\n      const waistText = hasWaist ? w.waist+'cm waist' : null;\n      const waistDisplay = hasWaist ? w.waist+'cm' : '—';\n      return {\n        idx:i, label:'Week '+(i+1),dateRange:Component.fmtRange(startDate),weight:w.weight,bf:w.bf,waistText,waistDisplay,current,\n        rowClass: current?'current-row':'',cardClass:'week-card'+(current?' current':''),deltaText,deltaClass,\n        startEdit: ()=>this.setState({editingWeekIdx:i, newWeight:String(w.weight), newBf:String(w.bf), newWaist: hasWaist?String(w.waist):'', showAddWeek:true}),\n        deleteWeek: ()=>{ if(window.confirm && !window.confirm('Delete '+('Week '+(i+1))+'?')) return; this.update(st=>({customWeeks: st.customWeeks.filter((_,idx)=>idx!==i)})); }\n      };\n    });\n    const canAddWeek = s.newWeight!=='' && s.newBf!=='' && !isNaN(parseFloat(s.newWeight)) && !isNaN(parseFloat(s.newBf));\n\n    return {\n      dateStr: new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}),\n      currentWeight: weeks.length ? weeks[weeks.length-1].weight : Component.BASE_WEEKS[Component.BASE_WEEKS.length-1].weight,\n      tab: s.tab,\n      isToday: s.tab==='today', isSchedule: s.tab==='schedule', isMeals: s.tab==='meals', isProgress: s.tab==='progress',\n      tabTodayClass: 'tab'+(s.tab==='today'?' active':''),\n      tabScheduleClass: 'tab'+(s.tab==='schedule'?' active':''),\n      tabMealsClass: 'tab'+(s.tab==='meals'?' active':''),\n      tabProgressClass: 'tab'+(s.tab==='progress'?' active':''),\n      goToday: ()=>this.update({tab:'today'}),\n      goSchedule: ()=>this.update({tab:'schedule'}),\n      goMeals: ()=>this.update({tab:'meals'}),\n      goProgress: ()=>this.update({tab:'progress'}),\n\n      calories: s.calories, calorieGoal,\n      calRingBg: this.ringBg(calPct,'var(--orange)'),\n      calRingClass: 'ring' + (calPct>=100?' hit':''),\n      addCal350: ()=>this.update(st=>({calories:st.calories+350})),\n      addCal450: ()=>this.update(st=>({calories:st.calories+450})),\n      addCal150: ()=>this.update(st=>({calories:st.calories+150})),\n      addCal400: ()=>this.update(st=>({calories:st.calories+400})),\n      resetCal: ()=>this.update({calories:0}),\n\n      water: s.water, waterGoal,\n      waterRingBg: this.ringBg(waterPct,'var(--blue)'),\n      waterRingClass: 'ring' + (waterPct>=100?' hit':''),\n      addWater250: ()=>this.update(st=>({water:st.water+250})),\n      addWater500: ()=>this.update(st=>({water:st.water+500})),\n      resetWater: ()=>this.update({water:0}),\n\n      stepsShort: s.steps>=1000 ? (s.steps/1000).toFixed(s.steps%1000===0?0:1)+'k' : s.steps,\n      stepGoalShort: (stepGoal/1000)+'k',\n      stepsRingBg: this.ringBg(stepsPct,'var(--green)'),\n      stepsRingClass: 'ring' + (stepsPct>=100?' hit':''),\n      addSteps1000: ()=>this.update(st=>({steps:st.steps+1000})),\n      addSteps2000: ()=>this.update(st=>({steps:st.steps+2000})),\n      addSteps5000: ()=>this.update(st=>({steps:st.steps+5000})),\n      resetSteps: ()=>this.update({steps:0}),\n\n      workoutsDoneCount, workoutsPct: workoutsDoneCount/7*100,\n      swapBtnClass: 'swap-btn' + (s.satSwap?' on':''),\n      toggleSwap: ()=>this.update(st=>({satSwap:!st.satSwap})),\n      displayDays, todayDay,\n\n      meals, mealsDoneCount, mealsTotalCount: mealPlan.ids.length, mealPlanLabel, totalKcal, totalCarbs, totalProtein, totalFat,\n      carbsPct: totalCarbs*4/totalKcal*100,\n      proteinPct: totalProtein*4/totalKcal*100,\n      fatPct: totalFat*9/totalKcal*100,\n      carbsPctRound: Math.round(totalCarbs*4/totalKcal*100),\n      proteinPctRound: Math.round(totalProtein*4/totalKcal*100),\n      fatPctRound: Math.round(totalFat*9/totalKcal*100),\n\n      weeks,\n      ...this.buildChart(weeks),\n      showAddWeek: s.showAddWeek,\n      toggleAddWeek: ()=>this.setState(st=>({showAddWeek:!st.showAddWeek,editingWeekIdx:null,newWeight:'',newBf:'',newWaist:''})),\n      newWeight: s.newWeight,\n      newBf: s.newBf,\n      newWaist: s.newWaist,\n      editingWeekIdx: s.editingWeekIdx,\n      isEditingWeek: s.editingWeekIdx!==null,\n      addWeekTitle: s.editingWeekIdx!==null ? 'Edit week' : 'Log this week',\n      cancelEditWeek: ()=>this.setState({editingWeekIdx:null,newWeight:'',newBf:'',newWaist:''}),\n      onNewWeightChange: (e)=>this.setState({newWeight:e.target.value}),\n      onNewBfChange: (e)=>this.setState({newBf:e.target.value}),\n      onNewWaistChange: (e)=>this.setState({newWaist:e.target.value}),\n      canAddWeek,\n      submitNewWeek: ()=>{\n        if(!canAddWeek) return;\n        this.update(st=>{\n          const waist = st.newWaist!=='' && !isNaN(parseFloat(st.newWaist)) ? parseFloat(st.newWaist) : null;\n          const entry = {weight:parseFloat(st.newWeight),bf:parseFloat(st.newBf),waist};\n          let customWeeks;\n          if(st.editingWeekIdx!==null){\n            customWeeks = st.customWeeks.map((w,i)=> i===st.editingWeekIdx ? entry : w);\n          } else {\n            customWeeks = [...st.customWeeks, entry];\n          }\n          return {customWeeks, newWeight:'', newBf:'', newWaist:'', showAddWeek:false, editingWeekIdx:null};\n        });\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
